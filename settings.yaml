discourse_amazon_affiliate:
  affiliate_enabled:
    default: true
    client: true
    description:
      en: Enable Amazon affiliate link rewriting. If you change this, you must rebake all posts with "rake posts:rebake".

  affiliate_text:
    type: string
    default: "As an Amazon Partner, this forum may be compensated if you make a purchase"
    client: true
    description:
      en: Disclaimer text shown on rewritten links

  # --- Regional affiliate tags ---
  # Leave a region blank to skip rewriting links for that Amazon storefront.

  affiliate_amazon_com:
    default: ""
    client: true
    description:
      en: "Amazon US affiliate tag (amazon.com)"

